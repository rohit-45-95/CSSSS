name: 🚀 CS Launcher Auto Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      arch:
        description: "Architecture (all/arm/arm64/x86/x86_64)"
        required: false
        default: "all"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  BuildCS:
    name: 🔨 CS Launcher Build (${{ matrix.arch }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [ "all", "arm64" ]
      fail-fast: false

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: 📦 Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: 🔐 Grant Permissions
        run: chmod +x gradlew

      - name: 📋 Build Info
        run: |
          echo "### 🚀 CS Launcher Build" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Arch | ${{ matrix.arch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Run | #${{ github.run_number }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY

      - name: 🧩 Build JRE Components
        run: |
          mkdir -p out
          ./gradlew jre_lwjgl3glfw:build \
            --no-daemon \
            --parallel \
            --build-cache

      - name: 📦 Build Debug APK (${{ matrix.arch }})
        run: |
          ./gradlew ZalithLauncher:assembleDebug \
            -Darch=${{ matrix.arch }} \
            --no-daemon \
            --parallel \
            --build-cache \
            --stacktrace

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CS-Launcher-${{ matrix.arch }}-#${{ github.run_number }}
          path: ZalithLauncher/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14
